name: Business Logic E2E (Playwright)
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test against'
        required: true

jobs:
  playwright-tests:
    if: github.event.deployment_status.state == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (JSON Reporter)
        run: npx playwright test --reporter=json > playwright-results.json
        continue-on-error: true # Essential so we can still merge failing reports
        env:
          BASE_URL: ${{ github.event.inputs.target_url || github.event.deployment_status.environment_url }}
          # Auth Secrets injected via GitHub Secrets
          # PLAYWRIGHT_TEST_USER_OKTA: ${{ secrets.OKTA_USER }}

      - name: Download Core Bee-Audit Report
        uses: actions/download-artifact@v4
        with:
          name: bee-audit-core-report
          path: bee-audit-report/
        continue-on-error: true # Might not exist if run independently

      - name: Install Bee-Audit CLI
        if: always()
        run: npm install -g bee-audit

      - name: 🐝 Execute Bee-Audit Orchestration Merge
        if: always()
        run: |
          bee-audit merge \
            --base-report bee-audit-report/details.json \
            --playwright-report playwright-results.json

      - name: Upload Final Unified Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bee-audit-final-report
          path: bee-audit-report/
