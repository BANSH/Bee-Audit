name: Bee-Audit CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  audit:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type Check
        run: npx tsc --noEmit || npm run type-check --if-present

      - name: Test
        run: npm test --if-present

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high

      - name: Generate Local CLI Report (Optional)
        run: |
          npx bee-audit --repo-url https://github.com/${{ github.repository }} --branch ${{ github.head_ref || github.ref_name }}
        continue-on-error: true

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bee-audit-report
          path: bee-audit-report/
