name: Business Logic E2E (Playwright)
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test against'
        required: true

jobs:
  playwright-tests:
    if: github.event.deployment_status.state == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ github.event.inputs.target_url || github.event.deployment_status.environment_url }}
          # Auth Secrets injected via GitHub Secrets
          # PLAYWRIGHT_TEST_USER_OKTA: ${{ secrets.OKTA_USER }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
