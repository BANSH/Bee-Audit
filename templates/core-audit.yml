name: Core Audit (Static & Hygiene)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  core-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bee-Audit CLI
        run: npm install -g bee-audit

      - name: Run Bee-Audit Core
        run: |
          bee-audit \
            --repo-url ${{ github.server_url }}/${{ github.repository }} \
            --branch ${{ github.head_ref || github.ref_name }}

      - name: Upload Core Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bee-audit-core-report
          path: bee-audit-report/
